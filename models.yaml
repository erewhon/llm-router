# LLM Router — Model Registry
# This is the single source of truth for all models.
# Run `llm-router-generate` to produce LiteLLM and node-agent configs.

nodes:
  delphi:
    host: delphi.local
    gpu: amd
    vram_gb: 64  # Strix Halo unified memory allocation
    agent_port: 8100
  archimedes:
    host: archimedes.local
    gpu: nvidia
    vram_gb: 128  # GB10 unified memory
    agent_port: 8100
  hypatia:
    host: hypatia.local
    gpu: nvidia
    vram_gb: 128  # GB10 unified memory
    agent_port: 8100
    services:
      comfyui:
        type: comfyui
        port: 8188
        label: ComfyUI

models:
  gpt-oss-120b:
    hf_repo: gpt-oss-120b
    backend: lmstudio
    node: delphi
    api_port: 1234
    vram_gb: 50
    always_on: true
    enabled: false
    tool_proxy: false
    aliases:
      - gpt-oss
    capabilities:
      - text
      - tool_calling

  qwen3-next-80b-a3b:
    hf_repo: Qwen/Qwen3-Next-80B-A3B-Instruct
    backend: lmstudio
    node: delphi
    api_port: 1234
    vram_gb: 66
    always_on: true
    enabled: false
    tool_proxy: true
    aliases: []
    capabilities:
      - text
      - tool_calling

