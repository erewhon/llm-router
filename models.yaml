# LLM Router — Model Registry
# This is the single source of truth for all models.
# Run `llm-router-generate` to produce LiteLLM and node-agent configs.

nodes:
  delphi:
    host: delphi.local
    gpu: amd
    vram_gb: 64  # Strix Halo unified memory allocation
    agent_port: 8100
  archimedes:
    host: archimedes.local
    gpu: nvidia
    vram_gb: 128  # GB10 unified memory
    agent_port: 8100
  hypatia:
    host: hypatia.local
    gpu: nvidia
    vram_gb: 128  # GB10 unified memory
    agent_port: 8100
    services:
      comfyui:
        type: comfyui
        port: 8188
        label: ComfyUI

models:
  gpt-oss-120b:
    hf_repo: gpt-oss-120b
    backend: lmstudio
    node: delphi
    api_port: 1234
    vram_gb: 50
    always_on: true
    enabled: false
    tool_proxy: false
    aliases:
      - gpt-oss
    capabilities:
      - text
      - tool_calling

  qwen3-next-80b-a3b:
    hf_repo: Qwen/Qwen3-Next-80B-A3B-Instruct
    backend: lmstudio
    node: delphi
    api_port: 1234
    vram_gb: 66
    always_on: true
    enabled: false
    tool_proxy: true
    aliases: []
    capabilities:
      - text
      - tool_calling

  qwen3.5-27b-research:
    hf_repo: qwen3.5-27b
    backend: lmstudio
    node: delphi
    api_port: 1234
    vram_gb: 29
    always_on: true
    tool_proxy: true
    aliases:
      - research
    capabilities:
      - text
      - tool_calling

  qwen3.5-35b-a3b-fast:
    hf_repo: qwen3.5-35b-a3b@q8_0
    backend: lmstudio
    node: delphi
    api_port: 1234
    vram_gb: 38
    always_on: true
    tool_proxy: true
    aliases:
      - research-fast
      - vision-fast
    capabilities:
      - text
      - vision
      - tool_calling

  # --- Default mode: individual models on each Spark ---

  qwen3.5-35b-a3b-spark:
    hf_repo: Qwen/Qwen3.5-35B-A3B
    backend: vllm
    node: archimedes
    api_port: 5391
    vram_gb: 70
    always_on: true
    tool_proxy: true
    aliases:
      - coder
      - vision
    capabilities:
      - text
      - vision
      - tool_calling
    tags:
      - mode:default
    vllm_args:
      tool_call_parser: qwen3_xml

  qwen3.5-27b-spark:
    hf_repo: Qwen/Qwen3.5-27B
    backend: vllm
    node: hypatia
    api_port: 5391
    vram_gb: 54
    always_on: true
    tool_proxy: true
    aliases:
      - thinker
    capabilities:
      - text
      - tool_calling
    tags:
      - mode:default
    vllm_args:
      tool_call_parser: qwen3_xml

  # --- Big mode: multi-node models (activated by spark-mode.sh big) ---

  qwen3.5-122b-a10b:
    hf_repo: Qwen/Qwen3.5-122B-A10B-FP8
    backend: vllm
    multi_node:
      nodes:
        - archimedes
        - hypatia
      tensor_parallel_size: 2
      head_node: archimedes
    api_port: 5391
    vram_gb: 235
    always_on: true
    tool_proxy: true
    aliases:
      - coder
      - thinker
      - vision
    capabilities:
      - text
      - vision
      - tool_calling
    tags:
      - mode:big
    vllm_args:
      tool_call_parser: qwen3_xml

