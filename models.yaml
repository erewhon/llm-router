  qwen3.5-27b:
    hf_repo: Qwen/Qwen3.5-27B-GPTQ-Int4
    backend: vllm
    node: hypatia
    vram_gb: 32
    always_on: true
    enabled: false
    tool_proxy: false
    aliases:
      - thinker
    capabilities:
      - text
