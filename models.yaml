# LLM Router — Model Registry
# This is the single source of truth for all models.
# Run `llm-router-generate` to produce LiteLLM and node-agent configs.

nodes:
  delphi:
    host: delphi
    gpu: amd
    vram_gb: 64  # Strix Halo unified memory allocation
    agent_port: 8100
  archimedes:
    host: archimedes
    gpu: nvidia
    vram_gb: 128  # GB10 unified memory
    agent_port: 8100
  hypatia:
    host: hypatia
    gpu: nvidia
    vram_gb: 128  # GB10 unified memory
    agent_port: 8100

models:
  gpt-oss-120b:
    hf_repo: gpt-oss-120b
    backend: lmstudio
    node: delphi
    api_port: 1234
    vram_gb: 50
    always_on: true
    tool_proxy: false
    aliases:
      - gpt-oss
    capabilities:
      - text
      - tool_calling

  qwen3-30b:
    hf_repo: Qwen/Qwen3-30B-A3B
    backend: vllm
    node: archimedes
    vram_gb: 20
    always_on: true
    tool_proxy: true
    aliases:
      - medium-coding
      - medium-research
    capabilities:
      - text
      - tool_calling
    vllm_args:
      tool_call_parser: qwen3_xml

  qwen3-235b:
    hf_repo: Qwen/Qwen3-235B-A22B
    backend: vllm
    node: archimedes
    vram_gb: 55
    always_on: false
    tool_proxy: true
    aliases:
      - large-coding
      - large-research
    capabilities:
      - text
      - tool_calling
    vllm_args:
      tool_call_parser: qwen3_xml

  llama4-scout-109b:
    hf_repo: meta-llama/Llama-4-Scout-17B-16E-Instruct
    backend: vllm
    multi_node:
      nodes:
        - archimedes
        - hypatia
      tensor_parallel_size: 2
    vram_gb: 120
    always_on: false
    tool_proxy: true
    aliases:
      - large-multimodal
    capabilities:
      - text
      - vision
      - tool_calling
    vllm_args:
      tool_call_parser: llama3_json

  devstral-small:
    hf_repo: mistralai/Devstral-Small-2505
    backend: vllm
    node: archimedes
    vram_gb: 28
    always_on: false
    tool_proxy: false
    aliases:
      - small-coding
    capabilities:
      - text
      - tool_calling
    vllm_args:
      tool_call_parser: mistral

  qwen3-30b-gguf:
    hf_repo: Qwen/Qwen3-30B-A3B-GGUF
    backend: llamacpp
    node: delphi
    gguf_file: /data/models/Qwen3-30B-A3B-Q4_K_M.gguf
    vram_gb: 20
    always_on: true
    tool_proxy: false
    aliases:
      - delphi-default
    capabilities:
      - text
      - tool_calling
    vllm_args:
      max_model_len: 32768
