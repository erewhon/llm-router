# LLM Router — Model Registry
# This is the single source of truth for all models.
# Run `llm-router-generate` to produce LiteLLM and node-agent configs.

nodes:
  delphi:
    host: delphi.local
    gpu: amd
    vram_gb: 64  # Strix Halo unified memory allocation
    agent_port: 8100
  archimedes:
    host: archimedes.local
    gpu: nvidia
    vram_gb: 128  # GB10 unified memory
    agent_port: 8100
  hypatia:
    host: hypatia.local
    gpu: nvidia
    vram_gb: 128  # GB10 unified memory
    agent_port: 8100
    services:
      comfyui:
        type: comfyui
        port: 8188
        label: ComfyUI

models:
  gpt-oss-120b:
    hf_repo: gpt-oss-120b
    backend: lmstudio
    node: delphi
    api_port: 1234
    vram_gb: 50
    always_on: true
    enabled: false
    tool_proxy: false
    aliases:
      - gpt-oss
    capabilities:
      - text
      - tool_calling

  qwen3-next-80b-a3b:
    hf_repo: Qwen/Qwen3-Next-80B-A3B-Instruct
    backend: lmstudio
    node: delphi
    api_port: 1234
    vram_gb: 66
    always_on: true
    enabled: false
    tool_proxy: true
    aliases: []
    capabilities:
      - text
      - tool_calling

  qwen3.5-27b-research:
    hf_repo: qwen3.5-27b
    backend: lmstudio
    node: delphi
    api_port: 1234
    vram_gb: 29
    always_on: true
    tool_proxy: true
    aliases:
      - research
    capabilities:
      - text
      - tool_calling

  qwen3.5-35b-a3b-fast:
    hf_repo: qwen3.5-35b-a3b@q8_0
    backend: lmstudio
    node: delphi
    api_port: 1234
    vram_gb: 38
    always_on: true
    tool_proxy: true
    aliases:
      - research-fast
      - vision-fast
    capabilities:
      - text
      - vision
      - tool_calling

  qwen3-vl-8b:
    hf_repo: cyankiwi/Qwen3-VL-8B-Instruct-AWQ-4bit
    backend: vllm
    node: hypatia
    api_port: 5393
    vram_gb: 10
    always_on: true
    enabled: false
    tool_proxy: false
    aliases:
      - small-multimodal
      - vision
    capabilities:
      - text
      - vision
      - tool_calling
    vllm_args:
      tool_call_parser: qwen3_xml
      max_model_len: 32768
      extra_args:
        - --limit-mm-per-prompt
        - '{"image":4}'

  qwen3-coder-next:
    hf_repo: qwen/qwen3-coder-next
    backend: lmstudio
    node: archimedes
    api_port: 1234
    vram_gb: 48
    always_on: true
    enabled: false
    tool_proxy: false
    aliases:
      - coder
    capabilities:
      - text
      - tool_calling

