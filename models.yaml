# LLM Router — Model Registry
# This is the single source of truth for all models.
# Run `llm-router-generate` to produce LiteLLM and node-agent configs.

nodes:
  delphi:
    host: delphi
    gpu: amd
    vram_gb: 64  # Strix Halo unified memory allocation
    agent_port: 8100
  archimedes:
    host: archimedes
    gpu: nvidia
    vram_gb: 128  # GB10 unified memory
    agent_port: 8100
  hypatia:
    host: hypatia
    gpu: nvidia
    vram_gb: 128  # GB10 unified memory
    agent_port: 8100

models:
  gpt-oss-120b:
    hf_repo: gpt-oss-120b
    backend: lmstudio
    node: delphi
    api_port: 1234
    vram_gb: 50
    always_on: true
    tool_proxy: false
    aliases:
      - gpt-oss
    capabilities:
      - text
      - tool_calling

  qwen3-vl-8b:
    hf_repo: qwen/qwen3-vl-8b
    backend: lmstudio
    node: archimedes
    api_port: 1234
    vram_gb: 8
    always_on: true
    tool_proxy: false
    aliases:
      - small-multimodal
    capabilities:
      - text
      - vision
      - tool_calling

  qwen2.5-1.5b:
    hf_repo: Qwen/Qwen2.5-1.5B-Instruct
    backend: vllm
    multi_node:
      nodes:
        - archimedes
        - hypatia
      tensor_parallel_size: 2
      head_node: archimedes
    vram_gb: 4
    always_on: false
    tool_proxy: false
    capabilities:
      - text
      - tool_calling
    tags:
      - multi-node
      - containerized

